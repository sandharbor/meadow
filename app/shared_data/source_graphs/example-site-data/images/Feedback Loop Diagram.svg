<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#f8f9fa" rx="8"/>
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">Feedback Loop</text>
  <!-- Loop arrows -->
  <path d="M 120 100 A 80 80 0 0 1 280 100" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrowRight)"/>
  <path d="M 280 100 A 80 80 0 0 1 120 100" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrowLeft)"/>
  <!-- Labels -->
  <rect x="80" y="85" width="80" height="30" rx="4" fill="#4f46e5" opacity="0.1" stroke="#4f46e5"/>
  <text x="120" y="105" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4f46e5">Action</text>
  <rect x="240" y="85" width="80" height="30" rx="4" fill="#059669" opacity="0.1" stroke="#059669"/>
  <text x="280" y="105" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#059669">Result</text>
  <text x="200" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4f46e5">causes</text>
  <text x="200" y="160" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#059669">influences</text>
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/></marker>
    <marker id="arrowLeft" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#059669"/></marker>
  </defs>
</svg>
