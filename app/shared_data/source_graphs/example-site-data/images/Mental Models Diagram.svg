<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#f8f9fa" rx="8"/>
  <text x="200" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333">Mental Models Lattice</text>
  <!-- Nodes -->
  <circle cx="200" cy="80" r="24" fill="#4f46e5" opacity="0.8"/>
  <text x="200" y="84" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">First Principles</text>
  <circle cx="100" cy="150" r="24" fill="#0891b2" opacity="0.8"/>
  <text x="100" y="154" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">Inversion</text>
  <circle cx="300" cy="150" r="24" fill="#0891b2" opacity="0.8"/>
  <text x="300" y="154" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">Feedback</text>
  <circle cx="150" cy="230" r="24" fill="#059669" opacity="0.8"/>
  <text x="150" y="234" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">Probability</text>
  <circle cx="250" cy="230" r="24" fill="#059669" opacity="0.8"/>
  <text x="250" y="234" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">Safety</text>
  <!-- Connections -->
  <line x1="180" y1="96" x2="120" y2="134" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="220" y1="96" x2="280" y2="134" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="120" y1="166" x2="140" y2="214" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="280" y1="166" x2="260" y2="214" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="174" y1="230" x2="226" y2="230" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="200" y1="104" x2="200" y2="200" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4"/>
</svg>
